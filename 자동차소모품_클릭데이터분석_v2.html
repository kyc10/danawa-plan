<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자동차 소모품 클릭 데이터 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --header-h: 68px;
    --nav-bg: rgba(13,17,23,0.95);
    --nav-border: #1e293b;
    --active-claude: #1e3a5f;
    --active-gs: #162e16;
  }

  html, body {
    height: 100%;
    background: #0d1117;
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    color: #f1f5f9;
  }

  /* ────────── MAIN HEADER ────────── */
  .main-header {
    background: linear-gradient(135deg, #0a0f18 0%, #121d33 60%, #0a0f18 100%);
    border-bottom: 1px solid var(--nav-border);
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
  }

  .main-header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: var(--header-h);
    gap: 16px;
  }

  /* Title */
  .main-title-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .main-title-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 16px rgba(37,99,235,0.35);
    flex-shrink: 0;
  }

  .main-title-text { display: flex; flex-direction: column; gap: 3px; }

  .main-title {
    font-size: 17px;
    font-weight: 800;
    color: #f1f5f9;
    letter-spacing: -0.03em;
    line-height: 1.2;
  }
  .main-title em { color: #60a5fa; font-style: normal; }

  .main-subtitle {
    font-size: 11px;
    color: #334155;
    font-weight: 400;
  }

  /* ────────── TAB NAV ────────── */
  .tab-nav {
    display: flex;
    gap: 4px;
    background: rgba(10,15,24,0.7);
    border: 1px solid #1e293b;
    border-radius: 14px;
    padding: 5px;
  }

  .tab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 24px;
    border: 1px solid transparent;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #334155;
    background: transparent;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }

  .tab-btn .t-icon { font-size: 15px; line-height: 1; }
  .tab-btn .t-label { font-size: 13px; }
  .tab-btn .t-badge {
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px;
    transition: all 0.2s;
  }

  /* Claude tab */
  .tab-btn.tab-claude.active {
    background: linear-gradient(135deg, #1e3a5f, #162d4a);
    color: #bfdbfe;
    border-color: rgba(59,130,246,0.45);
    box-shadow: 0 0 18px rgba(59,130,246,0.2), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .tab-btn.tab-claude.active .t-badge {
    background: rgba(59,130,246,0.2); color: #93c5fd;
  }
  .tab-btn.tab-claude:not(.active):hover {
    color: #7dd3fc;
    background: rgba(30,58,95,0.25);
    border-color: rgba(59,130,246,0.2);
  }
  .tab-btn.tab-claude .t-badge { background: rgba(59,130,246,0.06); color: #1e293b; }

  /* Genspark tab */
  .tab-btn.tab-gs.active {
    background: linear-gradient(135deg, #14291a, #0e1e0f);
    color: #bbf7d0;
    border-color: rgba(34,197,94,0.4);
    box-shadow: 0 0 18px rgba(34,197,94,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .tab-btn.tab-gs.active .t-badge {
    background: rgba(34,197,94,0.18); color: #86efac;
  }
  .tab-btn.tab-gs:not(.active):hover {
    color: #86efac;
    background: rgba(20,41,26,0.25);
    border-color: rgba(34,197,94,0.2);
  }
  .tab-btn.tab-gs .t-badge { background: rgba(34,197,94,0.06); color: #1e293b; }

  /* ────────── CONTENT AREA ────────── */
  .tab-panels {
    height: calc(100vh - var(--header-h));
    position: relative;
  }

  .tab-panel {
    display: none;
    width: 100%;
    height: 100%;
  }
  .tab-panel.active { display: block; }

  .tab-panel iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ────────── RESPONSIVE ────────── */
  @media (max-width: 768px) {
    .main-header { padding: 0 14px; }
    :root { --header-h: 56px; }
    .main-title { font-size: 13px; }
    .main-subtitle { display: none; }
    .tab-btn { padding: 7px 12px; }
    .tab-btn .t-badge { display: none; }
  }
</style>
</head>
<body>

<!-- ══════════ HEADER ══════════ -->
<header class="main-header">
  <div class="main-header-inner">

    <div class="main-title-wrap">
      <div class="main-title-icon">🚗</div>
      <div class="main-title-text">
        <div class="main-title">자동차 소모품 <em>클릭 데이터 분석</em></div>
        <div class="main-subtitle">2024.11.24 – 12.28 &nbsp;·&nbsp; 5주간 &nbsp;·&nbsp; PC &amp; Mobile</div>
      </div>
    </div>

    <nav class="tab-nav" role="tablist">
      <button class="tab-btn tab-claude active"
              id="btn-claude"
              onclick="switchTab('claude', this)"
              role="tab" aria-selected="true" aria-controls="panel-claude">
        <span class="t-icon">🤖</span>
        <span class="t-label">클로드</span>
        <span class="t-badge">Claude</span>
      </button>
      <button class="tab-btn tab-gs"
              id="btn-genspark"
              onclick="switchTab('genspark', this)"
              role="tab" aria-selected="false" aria-controls="panel-genspark">
        <span class="t-icon">⚡</span>
        <span class="t-label">젠스파크</span>
        <span class="t-badge">Genspark</span>
      </button>
    </nav>

  </div>
</header>

<!-- ══════════ PANELS ══════════ -->
<div class="tab-panels">

  <div class="tab-panel active" id="panel-claude" role="tabpanel" aria-labelledby="btn-claude">
    <iframe id="iframe-claude" title="클로드 대시보드" loading="eager"></iframe>
  </div>

  <div class="tab-panel" id="panel-genspark" role="tabpanel" aria-labelledby="btn-genspark">
    <iframe id="iframe-genspark" title="젠스파크 대시보드" loading="lazy"></iframe>
  </div>

</div>

const loaded = { claude: false, genspark: false };

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-selected', 'false');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');

  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');

  if (!loaded[tab]) {
    document.getElementById('iframe-' + tab).src = DASH[tab];
    loaded[tab] = true;
  }
  // Notify iframe of resize after tab show
  setTimeout(() => window.dispatchEvent(new Event('resize')), 80);
}

// Initial load
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('iframe-claude').src = DASH.claude;
  loaded.claude = true;
});
</script>
